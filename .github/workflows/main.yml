name: CI/CD Infra + Config Pipeline

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo structure
        run: |
          pwd
          ls -la
          find . -maxdepth 4 -type f

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Validate Flask app
        working-directory: app
        run: python -c "from app import app; print('Flask app loaded successfully')"

      - name: Install Ansible
        run: |
          python -m pip install ansible

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Destroy
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform destroy -auto-approve

      - name: Terraform Apply
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: terraform apply -auto-approve

      - name: Get Master IP
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: terraform
        run: |
          MASTER_IP=$(terraform output -raw master_ip)
          echo "MASTER_IP=$MASTER_IP" >> $GITHUB_ENV
          echo "Master IP: $MASTER_IP"

      - name: Create SSH key file
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > private_key.pem
          chmod 600 private_key.pem

      - name: Update Ansible inventory dynamically
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cat > ansible/inventory.ini <<EOF
          [master]
          $MASTER_IP ansible_user=ec2-user ansible_ssh_private_key_file=../private_key.pem ansible_ssh_common_args='-o StrictHostKeyChecking=no'
          EOF

          echo "Generated inventory:"
          cat ansible/inventory.ini

      - name: Wait for EC2 to be ready
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          echo "Waiting for EC2 boot..."
          sleep 60

      - name: Test Ansible connection
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ansible
        run: ansible all -i inventory.ini -m ping

      - name: Run Ansible Playbook
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        working-directory: ansible
        run: ansible-playbook -i inventory.ini main.yml
